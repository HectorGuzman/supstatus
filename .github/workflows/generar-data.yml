name: Generar data de spots

on:
  schedule:
    - cron: '0 7 * * *'  # 3-4 AM hora Chile
  workflow_dispatch:
    inputs:
      spot:
        description: 'ID del spot a regenerar (vacío = todos)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install openai requests pytz

      - name: Configurar Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git pull origin main --rebase

      - name: Generar data (todos los spots)
        if: ${{ github.event.inputs.spot == '' }}
        run: python obtener_desde_chatgpt.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generar data (spot específico)
        if: ${{ github.event.inputs.spot != '' }}
        run: python obtener_desde_chatgpt.py --spot ${{ github.event.inputs.spot }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Reintentar spots fallidos
        if: ${{ failure() && github.event.inputs.spot == '' }}
        run: python obtener_desde_chatgpt.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Verificar cambios
        id: git-check
        run: |
          git add data-*.json
          if git diff --cached --quiet; then
            echo "skip_commit=true" >> $GITHUB_ENV
          else
            echo "skip_commit=false" >> $GITHUB_ENV
          fi

      - name: Commit y push
        if: env.skip_commit == 'false'
        run: |
          git commit -m "🔄 Actualización diaria de spots"
          git push
